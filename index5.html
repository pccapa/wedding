<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pablo y Jannet - Invitación de nuestro matrimonio</title>

    <style>
      body {
        margin: 0;
        font-family: Georgia, serif;
        background: linear-gradient(135deg, #fff1f2, #ffffff, #ffe4e6);
        overflow-x: hidden;
      }

      /* INTRO */
      .intro {
        position: fixed;
        inset: 0;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        animation: fadeOut 2.5s ease forwards;
        animation-delay: 1.5s;
      }

      .intro h1 {
        color: white;
        font-size: clamp(18px, 5vw, 28px);
        letter-spacing: 4px;
        opacity: 0;
        animation: fadeInText 1.2s ease forwards;
      }

      @keyframes fadeInText {
        from {
          opacity: 0;
          transform: scale(1.1);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes fadeOut {
        to {
          opacity: 0;
          visibility: hidden;
        }
      }

      /* CARD */
      .card {
        width: 92%;
        max-width: 850px;
        margin: 40px auto;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
        min-height: 100vh;
        display: flex;
        flex-direction: column;

        opacity: 0;
        transform: scale(1.05);
        animation: cardIn 1.2s ease forwards;
        animation-delay: 2s;
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      /* HEADER */
      .header {
        text-align: center;
        padding: 28px 16px;
        background: linear-gradient(90deg, #fecdd3, #ffe4e6);
      }

      .names {
        font-size: clamp(28px, 7vw, 44px);
        color: #9f1239;
        margin: 0;
        opacity: 0;
        animation: reveal 1.5s ease forwards;
        animation-delay: 2.5s;
      }

      .subtitle {
        margin-top: 8px;
        font-size: 14px;
        color: #be123c;
      }

      @keyframes reveal {
        from {
          opacity: 0;
          letter-spacing: 10px;
        }
        to {
          opacity: 1;
          letter-spacing: 2px;
        }
      }

      .countdown {
        margin-top: 10px;
        font-size: 14px;
        color: #9f1239;
        font-weight: bold;
      }

      /* VIDEO */
      .video {
        aspect-ratio: 16 / 9;
        width: 100%;
        background: black;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      /* CONTENT */
      .content {
        padding: 20px;
        text-align: center;
        flex: 1;
      }

      h2 {
        font-size: 20px;
        color: #111827;
      }

      p {
        font-size: 14px;
        color: #6b7280;
      }

      .grid {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 15px;
      }

      .box {
        background: #fff1f2;
        padding: 12px;
        border-radius: 12px;
        min-width: 120px;
        font-size: 13px;
        flex: 1 1 120px;
      }

      /* PETALS */
      .petal {
        position: fixed;
        top: -10px;
        width: 8px;
        height: 8px;
        background: pink;
        border-radius: 50%;
        opacity: 0.6;
        animation: fall linear infinite;
        z-index: 1;
        pointer-events: none;
      }

      .footer p {
        color: #9f1239;
        font-size: 14px;
        margin: 0;
      }

      .footer h3 {
        margin-top: 8px;
        font-size: 20px;
        color: #9f1239;
      }

      .video {
        width: 100%;
        aspect-ratio: 16 / 9;
        background: black;
      }

      .video video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border: none;
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(360deg);
          opacity: 0;
        }
      }

      @media (max-width: 600px) {
        .card {
          margin: 20px auto;
          border-radius: 16px;
        }

        .box {
          flex: 1 1 100%;
        }
      }
    </style>
  </head>

  <body>
    <div class="intro">
      <h1>Nuestro matrimonio civil</h1>
    </div>

    <script>
      const isMobile = window.innerWidth < 600;
      const count = isMobile ? 12 : 25;

      for (let i = 0; i < count; i++) {
        const petal = document.createElement("div");
        petal.className = "petal";
        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = 3 + Math.random() * 5 + "s";
        petal.style.width = petal.style.height = 5 + Math.random() * 6 + "px";
        document.body.appendChild(petal);
      }
    </script>

    <div class="card">
      <div class="header">
        <h1 class="names">Pablo y Jannet</h1>
        <p class="subtitle">Los invitamos a celebrar nuestro día especial 💍</p>
      </div>

      <div class="video">
        <div class="video">
          <video autoplay muted controls playsinline>
            <source src="wedding.mp4" type="video/mp4" />
            Tu navegador no soporta este tipo de video.
          </video>
        </div>
      </div>

      <div class="content">
        <h2>Estas invitado</h2>
        <p>Únete a esta bonita celebración de amor y felicidad.</p>

        <div class="grid">
          <div class="box">
            <strong>Fecha</strong><br />
            15 de Mayo del 2026
          </div>

          <div class="box">
            <strong>Hora</strong><br />
            9:00 PM
          </div>

          <div class="box">
            <strong>Lugar</strong><br />
            Sector 1 Grupo 5 Mz H Lote 5 - Villa el Salvador
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
