<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pablo & Jannet</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Georgia, serif;
  background: black;
}

/* VIDEO BACKGROUND */
.video-bg {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

.video-bg video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}


/* NAMES */
.names {
  font-size: clamp(28px, 9vw, 70px);
  letter-spacing: 3px;
  margin: 0;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
}

/* DATE */
.date {
  margin-top: 12px;
  font-size: clamp(12px, 3vw, 16px);
  letter-spacing: 2px;
  opacity: 0;
  animation: fadeIn 2s ease forwards;
  animation-delay: 1s;
}

/* TAP HINT */
.tap {
  position: absolute;
  bottom: 20px;
  font-size: 12px;
  opacity: 0.7;
}

/* ANIMATION */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="video-bg">
  <video id="bgVideo" autoplay muted playsinline loop>
    <source src="wedding.mp4" type="video/mp4">
  </video>
</div>

<script>
function unmuteVideo() {
  const video = document.getElementById("bgVideo");
  video.muted = false;
  video.play();
}
</script>

</body>
</html>
